version: '3.8'

services:
  algo-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.algo
    container_name: nifty-algo-dashboard
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - ENV=production
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - trading-network

  # Optional: Add Nginx reverse proxy
  nginx:
    image: nginx:alpine
    container_name: nifty-dashboard-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - algo-dashboard
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge

volumes:
  logs:
